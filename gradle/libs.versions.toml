# This file was generated by the Gradle 'init' task.
# https://docs.gradle.org/current/userguide/version_catalogs.html#sec::toml-dependencies-format

[versions]
# -------- Gradle Plugins --------
javafx-plugin = "0.1.0"
jlink-plugin = "3.2.1"

# -------- Libraries --------
dagger = "2.59.2"
gson = "2.13.2"
guava = "33.5.0-jre"
javafx-version = "25.0.2"
junit-jupiter = "6.0.3"
log4j = "2.25.3"
mockito = "5.22.0"
pmd = "7.22.0"
rxjava = "3.1.12"
slf4j-api = "2.0.17"

[libraries]
# -------- Gradle Plugins --------
javafx-plugin = { module = "org.openjfx:javafx-plugin", version.ref = "javafx-plugin" }

# -------- Libraries --------
# log4j-api = { module = "org.apache.logging.log4j:log4j-api", version.ref = "log4j" }
# log4j-core = { module = "org.apache.logging.log4j:log4j-core", version.ref = "log4j" }
dagger = { module = "com.google.dagger:dagger", version.ref = "dagger" }
dagger-compiler = { module = "com.google.dagger:dagger-compiler", version.ref = "dagger" }
gson = { module = "com.google.code.gson:gson", version.ref = "gson" }
guava = { module = "com.google.guava:guava", version.ref = "guava" }
junit-jupiter = { module = "org.junit.jupiter:junit-jupiter", version.ref = "junit-jupiter" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }
log4j-slf4j2-impl = { module = "org.apache.logging.log4j:log4j-slf4j2-impl", version.ref = "log4j" }
mockito-core = { module = "org.mockito:mockito-core", version.ref = "mockito" }
mockito-junit-jupiter = { module = "org.mockito:mockito-junit-jupiter", version.ref = "mockito" }
rxjava = { module = "io.reactivex.rxjava3:rxjava", version.ref = "rxjava" }
slf4j-api = { module = "org.slf4j:slf4j-api", version.ref = "slf4j-api" }

[plugins]
jlink-plugin = { id = "org.beryx.jlink", version.ref = "jlink-plugin" }
